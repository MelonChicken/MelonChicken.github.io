name: Sync Notion Content

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write

concurrency:
  group: notion-content-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN || secrets.NOTION_TOKEN }}
      NOTION_VERSION: 2026-03-11
      NOTION_API_MODE: data-source
      NOTION_PROJECTS_DATA_SOURCE_ID: ${{ secrets.NOTION_PROJECTS_DATA_SOURCE_ID }}
      NOTION_NOTES_DATA_SOURCE_ID: ${{ secrets.NOTION_NOTES_DATA_SOURCE_ID }}
      ASTRO_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Notion access
        run: npm run notion:debug

      - name: Sync Notion MDX and assets
        run: npm run sync:notion

      - name: Debug after Notion sync
        run: |
          echo "=== generated notes ==="
          find src/content/notes -maxdepth 1 -type f -name "*.mdx" -print || true

          echo "=== generated projects ==="
          find src/content/projects -maxdepth 1 -type f -name "*.mdx" -print || true

          echo "=== git status after sync ==="
          git status --short

          echo "=== untracked files ==="
          git ls-files --others --exclude-standard src/content || true

          echo "=== diff name-only ==="
          git diff --name-only || true

      - name: Check content schema
        run: npm run check

      - name: Build site
        run: npm run build

      - name: Commit synced content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A src/content/projects src/content/notes public/notion-assets

          echo "=== staged files ==="
          git diff --cached --name-status

          if git diff --cached --quiet; then
            echo "No Notion content changes to commit."
          else
            git commit -m "chore: sync notion content"
            git push
          fi
